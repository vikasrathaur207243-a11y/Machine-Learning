<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>
<style>
 .box{
            margin: 10px;
            padding: 20px;
            background-color: green;
            color: wheat;
            text-align: center;
            font-size: 30px;
            display: none;
        }
        /* mobile View  */

        @media(min-width:0px) and (max-width:480px)
        {
            .mobile
            {   
                color:white;
                display:block;
                font-size:20px;
                background-color:orange;
            }
        }
        
        

        /* Tablet View  */

        @media(min-width:480px) and (max-width:768px)
        {
            .tablet
            {   
                color:white;
                display:block;
                font-size:25px;
                background-color:green;
            }
        }
        /* Laptop View  */

        @media(min-width:768px) and (max-width:1024px)
        {
            .laptop
            {   
                color:white;
                display:block;
                font-size:30px;
                background-color:black;
            }
        }

        /* Desktop view  */
        @media(min-width: 1025px){
            .desktop{
                background-color: red;
                color: white;
                font-size: 35px;
                display:block;

            }
        }
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('https://4kwallpapers.com/images/walls/thumbs/13849.png') no-repeat center center/cover;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content:center;
}

/* Dark overlay */
body::before {
    content: "center";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0);
}

/* Login Box */
.login-box {
    position: relative;
    background: #fff;
    width: 350px;
    padding: 30px;
    margin-right: 80px;
    border-radius: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.login-box h2 {
    background:lightblue;
    color:black;
    padding: 15px;
    margin: -30px -30px 20px -30px;
    border-radius: 15px;
    text-align: center;
}

.login-box input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ccc;
}


/* Button */
.login-box button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#00c6ff;
    background: linear-gradient(to right, #0072ff, #00c6ff);
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}
.links {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
}

.links a {
    text-decoration: none;
    color:black;
}
</style>
</head>
<body>

<div class="login-box">
    <h2>Sign in to your account</h2>
    <input type="text" placeholder="User Name">
    <input type="password" placeholder="Password">

    <div class="links">
        <a href="#">Forgot Password</a>
        <a href="#">Registration</a>
    </div>

    <button>SIGN IN</button>
</div>

</body>
</html>
