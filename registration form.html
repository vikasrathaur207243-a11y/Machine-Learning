<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
</head>
<body>
    <h2>Registration form</h2>

<form>
    <label>First name:</label> 
   <input type="text"placeholder="enter first name"><br></br>

   <label>Last name:</label> 
   <input type="text"placeholder="enter last name"><br></br>

   <label>Email:</label> 
   <input type="text"placeholder="enter email"><br></br>

   <label>Mobile:</label> 
   <input type="text"placeholder="enter mobile no. "><br></br>

   <label>Password:</label> 
   <input type="text"placeholder="enter password"><br></br>

   <label>Date of Birth:</label> 
   <input type="date"><br></br>

   <label>Gender:</label>
   <input type="radio" name="gender"> Male
   <input type="radio" name="gender"> Female
   <input type="radio" name="gender"> Other
   <br></br>

   <label>Course:</label>
   <select>

    <option>--Select Course--</option>
    
    
    <option>B.tech</option>
    <option>M.tech</option>
    <option>BCA</option>
    <option>MCA</option>
    <option>BBA</option>
    <option>MBA</option>
    <option>B.COM</option>
    <option>B.pharma</option>
    <option>D.pharma</option>
   </select><br></br> 

   <label>Skill:</label>

   <input type="checkbox">HTML
   <input type="checkbox">PYTHON
   <input type="checkbox">JavaScript
   <input type="checkbox">SQL
   <br></br>

   <label>Address:</label>
   <textarea rows="4", cols="30" placeholder="Enter Address"></textarea>
   <br></br>

   <label>Upload Photo</label>
   <input type="file">
   <br></br>

   <input type="submit"value="submit form">
   <input type="reset"value="Reset">
   
</form>
   
</body>
</html>
